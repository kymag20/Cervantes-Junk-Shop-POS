{% extends 'pos/base.html' %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-3">
  <div>
    <h4 class="mb-1 fw-bold">Materials</h4>
    <p class="text-muted mb-0">Manage buyable junkshop materials</p>
  </div>
  <button class="btn btn-success rounded-3 px-3" type="button"><i class="bi bi-plus-lg me-1"></i> Add Material</button>
</div>
<div class="card border-0 shadow-sm p-3 mb-3">
  <div class="input-group">
    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
    <input type="text" class="form-control border-start-0 ps-0" placeholder="Search materials...">
  </div>
</div>
<div class="card border-0 shadow-sm">
  <div class="table-responsive">
    <table class="table align-middle mb-0">
      <thead class="table-light"><tr><th>MATERIAL</th><th>BUY PRICE</th><th>UNIT</th><th>STATUS</th><th class="text-end">ACTIONS</th></tr></thead>
      <tbody>
      {% for mat in materials %}
        <tr><td>{{ mat.name }}</td><td>&#8369;{{ mat.price_per_unit }}</td><td>{{ mat.unit }}</td><td><span class="badge text-bg-success-subtle text-success border">Active</span></td><td class="text-end"><button class="btn btn-sm btn-outline-secondary" disabled>Edit</button></td></tr>
      {% empty %}
        <tr><td colspan="5" class="text-center text-muted py-4">No materials yet.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
